services:
  postgres:
    image: apache/age:release_PG16_1.5.0
    # If PG16_latest is unavailable on your Docker Hub, try:
    # image: apache/age:release_PG16_1.5.0
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ontosphere
      POSTGRES_PASSWORD: ontosphere
      POSTGRES_DB: ontosphere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontosphere -d ontosphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    profiles: ["neo4j"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ontosphere
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ontosphere 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ONTOSPHERE_AUTO_CREATE_TABLES: "true"
      DATABASE_URL: "postgresql+asyncpg://ontosphere:ontosphere@postgres:5432/ontosphere"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  celery-worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://ontosphere:ontosphere@postgres:5432/ontosphere"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: celery -A app.tasks worker --loglevel=info -Q ontosphere

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_WS_BASE_URL: ws://localhost:8000

volumes:
  postgres_data:
  upload_data:
  neo4j_data:
