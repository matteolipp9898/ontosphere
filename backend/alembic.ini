# Alembic configuration for OntoSphere
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory.
script_location = alembic

# Template used to generate migration files.
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend – so 'app' package is importable.
prepend_sys_path = .

# Timezone to use when generating revision timestamps.  "utc" recommended.
# timezone =

# Maximum length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .hierarchicalDotNotation in version_locations.
# version_path_separator = os

# The output encoding used when revision files are written.
output_encoding = utf-8

# Database URL – overridden at runtime by env.py from app.config.
sqlalchemy.url = postgresql+asyncpg://ontosphere:ontosphere@localhost:5432/ontosphere


[post_write_hooks]
# Uncomment the following to auto-format migrations with ruff.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
