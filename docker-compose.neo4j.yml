# Docker Compose override for Neo4j graph backend.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.neo4j.yml --profile neo4j up
#
# This sets GRAPH_BACKEND=neo4j and configures the backend/celery services
# to connect to the Neo4j container.

services:
  backend:
    environment:
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ontosphere
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy

  celery-worker:
    environment:
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ontosphere
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
